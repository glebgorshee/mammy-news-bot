name: Daily news digest

on:
  schedule:
    # 3 раза в день по МСК (UTC+3): 09:13, 15:13, 21:13 → 06:13, 12:13, 18:13 UTC.
    # Сдвинули с ровных часов (0 6/12/18) на :13 — на ровных минутах GitHub Actions
    # уходит в пиковую очередь и regularly skips или опаздывает на часы.
    - cron: "13 6 * * *"
    - cron: "13 12 * * *"
    - cron: "13 18 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    concurrency:
      group: daily-news
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GIGACHAT_CREDENTIALS: ${{ secrets.GIGACHAT_CREDENTIALS }}
        run: python bot.py

      - name: Commit state
        run: |
          git config user.name "news-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json || true
          git diff --staged --quiet || git commit -m "chore: update posted state [skip ci]"
          git push || true
