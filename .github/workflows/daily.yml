name: Daily news digest

on:
  schedule:
    # 3 раза в день по МСК (UTC+3): 09:00, 15:00, 21:00 → 06:00, 12:00, 18:00 UTC
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    concurrency:
      group: daily-news
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GIGACHAT_CREDENTIALS: ${{ secrets.GIGACHAT_CREDENTIALS }}
        run: python bot.py

      - name: Commit state
        run: |
          git config user.name "news-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json || true
          git diff --staged --quiet || git commit -m "chore: update posted state [skip ci]"
          git push || true
